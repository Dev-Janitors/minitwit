version: '3'
services:
    db:
        build: ./Database
        container_name: Database
        ports:
            - '1433:1433'

    api:
        build: ./Backend
        container_name: Backend
        ports:
            - '2222:80'
            - '2223:443'
        depends_on:
            - db

    prometheus:
        image: prom/prometheus
        container_name: prometheus
        volumes:
        - ./prometheus.yml:/etc/prometheus/prometheus.yml
        ports:
        - "9090:9090"
    
    grafana:
        image: grafana/grafana:4.5.2
        ports:
        - "3333:3000" 